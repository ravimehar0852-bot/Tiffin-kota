<script>
        function switchTab(type) {
            const customerTab = document.getElementById('tab-customer');
            const partnerTab = document.getElementById('tab-partner');
            
            if (type === 'customer') {
                customerTab.classList.remove('tab-inactive');
                customerTab.classList.add('tab-active');
                partnerTab.classList.remove('tab-active');
                partnerTab.classList.add('tab-inactive');
            } else {
                partnerTab.classList.remove('tab-inactive');
                partnerTab.classList.add('tab-active');
                customerTab.classList.remove('tab-active');
                customerTab.classList.add('tab-inactive');
            }
        }

        function toggleEmail() {
            const emailView = document.getElementById('email-login-view');
            const phoneView = document.getElementById('phone-login-view');
            
            if (emailView.classList.contains('hidden')) {
                emailView.classList.remove('hidden');
                // Optional: scroll to it
                emailView.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } else {
                emailView.classList.add('hidden');
            }
        }

        // Add subtle mouse-follow effect for the background blobs
        document.addEventListener('mousemove', (e) => {
            const accents = document.querySelectorAll('.floating-accent');
            const x = (e.clientX / window.innerWidth) * 20;
            const y = (e.clientY / window.innerHeight) * 20;
            
            accents.forEach((accent, index) => {
                const multiplier = index === 0 ? 1 : -1;
                accent.style.transform = `translate(${x * multiplier}px, ${y * multiplier}px)`;
            });
        });
    </script>
